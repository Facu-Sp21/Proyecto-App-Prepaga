version: "3.9"

services:
  oracle_dev:
    image: container-registry.oracle.com/database/express:latest
    container_name: app-prepaga-db-dev
    ports:
      - "1521:1521"
    environment:
      ORACLE_PWD: 123456
    volumes:
      - prepaga-db-dev-data:/opt/oracle/oradata

  oracle_test:
    image: container-registry.oracle.com/database/express:latest
    container_name: app-prepaga-db-test
    ports:
      - "1522:1521"   # distinto puerto para no chocar con el dev
    environment:
      ORACLE_PWD: 123456
    volumes:
      - prepaga-db-test-data:/opt/oracle/oradata

volumes:
  prepaga-db-dev-data:
  prepaga-db-test-data: